<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <title>Top 5 Positive News</title>
    <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
</head>

<body>
    <header>
        <h1>📰 Top 5 Positiva Nyheter</h1>
    </header>
    <div class="container">
        {% if articles %}
        {% for article in articles %}
        <div class="card">
            <img alt="image" src="{{ article.image }}">
            <div class="content">
                <h2>{{ article.titel }}</h2>
                <p class="date">{{ article.date }}</p>
                <a href="{{ article.url }}" target="_blank">Läs mer →</a>
            </div>
        </div>
        {% endfor %}
        {% else %}
        <div class="empty">
            <p class="date">Inga artiklar hittades</p>
        </div>
        {% endif %}
    </div>
</body>

</html>
