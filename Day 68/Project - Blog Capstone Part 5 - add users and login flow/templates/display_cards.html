<!DOCTYPE HTML>
<html>
<head>
  <title>Blog</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

  <section class="container py-5 ">
          {% if not posts %}
<div class="text-center col">
        <p>
        Du har inte skapat några blogg-inlägg än
        </p>
       {% endif %}
</div>
    <div class="row row-cols-1 row-cols-md-2  row-cols-lg-3 g-4">

      {% for item in posts %}
      <div class="col">
        <div class="card">
          <a href="{{ url_for('blog_post', post_id=item.id ) }}" class="image featured position-relative m-0 p-0">

            <img src={{item.image}} class="card-img-top image" alt="..." style="height: 20rem; object-fit:cover; ">
            <p class="position-absolute end-0 px-2 bottom-0 m-0 text-dark bg-white fst-italic cursor-default"   style="cursor: default;">     Författare: {{     item.author.name.title()   }}     </p>

          </a>

          <div class="card-body ">

            <h5 class="card-title">{{item.title}}</h5>
            <p class="card-text">{{item.subject}}</p>
          </div>
        </div>
      </div>
      {% endfor %}


    </div>
  </section>
</body>
</html>
