{% extends 'base.html' %}

{% block title %}Select Movie{% endblock %}

{% block content %}

<div class="container">
    <h1 class="heading">Select Movie</h1>

    {% for movie in movie_list%}

  <p>
    <a href="/add/{{movie['id']}}"> {{movie["title"]}} - {{movie["release_date"] if movie["release_date"] else "Unknown" }} </a>
  </p>

    {% endfor %}

</div>
{% endblock %}
