<!DOCTYPE html>
<html lang="sv">
<head>
  <title>Blog</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">
  <!-- Navbar-->
  {% include "navbar.html" %}
  <!-- Hero -->
  {% include "hero_small.html" %}

  <main class="flex-grow-1 d-flex align-items-center justify-content-center " style="background: #f1f3f5;">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-6">
          <div class="card shadow-lg p-4 pt-0 rounded-4 border-0      my-2  " style="background-color: #ffffff;">
            <div class="card-body">
              <h2 class="card-title mb-4 text-center fw-bold"></h2>
              <form method="POST" action="{{ url_for('contact') }}">

                <!-- E-post -->
                <div class="mb-4">
                  <label for="email" class="form-label mb-2">E-post</label>
                  <input type="email" class="form-control rounded-pill" id="email" name="email" placeholder="Din e-post"
                    required>
                </div>

                <!-- Meddelande -->
                <div class="mb-4">
                  <label for="message" class="form-label mb-2">Meddelande</label>
                  <textarea class="form-control rounded-3" id="message" name="message" rows="5"
                    placeholder="Skriv ditt meddelande här" required></textarea>
                </div>
                
                <!-- Skicka -->
                <div class="d-grid pt-4">
                  <button type="submit" class="btn btn-secondary btn-lg rounded-pill">Skicka</button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
