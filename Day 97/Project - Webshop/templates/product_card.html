<div class="col-md-4 mb-4">
    <div class="card h-100 shadow-sm rounded overflow-hidden">

        <div style="height: 300px; overflow: hidden;">
            <img alt="product" class="w-100 h-100" src="{{product.image}}" style="object-fit: cover;">
        </div>

        <div class="card-body ">

            <div class="d-flex w-100 pb-2">

                <div class="card-footer w-100 flex flex-column justify-content-start d-flex p-0  bg-white border-0 ">
                    <h5 class="card-title">
                        {{ product.product }}
                    </h5>

                    <p class="card-text">
                        ${{ product.price }}
                    </p>
                </div>

                <div class="card-footer w-100 d-flex justify-content-end align-items-start gap-4 bg-white border-0">
                    {% if user %}
                    <form action="{{ url_for('cart.add', product_id=product.id) }}" method="POST">
                        <input name="quantity" type="hidden" value="1">
<input type="hidden" name="sort_field" value="{{ sort_field }}">
<input type="hidden" name="sort_dir" value="{{ sort_dir }}">
<input type="hidden" name="this_path" value="{{ request.full_path }}">
                        <button class="p-0 icon">
                            <i class="bi bi-cart-plus"></i>
                        </button>
                    </form>
                    {% endif %}
                    {% if show_link_btn %}
                    <form action="{{ url_for('product.product', product_id=product.id) }}" method="POST">
                        <button class=" p-0 icon">
                            <i class="bi bi-eye "></i>
                        </button>
                    </form>
                    {% endif %}

                </div>
            </div>

            {% if not show_link_btn %}
            <p class="pt-2"> {{product.description}} </p>
            {% endif %}


        </div>


    </div>
</div>
