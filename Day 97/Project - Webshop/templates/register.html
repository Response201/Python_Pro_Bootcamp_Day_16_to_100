{% extends "base.html" %}
{% block title %}Sign up{% endblock %}
{% block content %}

<div class="container d-flex justify-content-center align-items-center pt-5"  style="height:85vh; min-height:fit-content; ">

    <div class="card shadow-sm p-4" style="max-width: 420px; width: 100%;">

        <h1 class="text-center mb-4">Register</h1>

        <form action="{{ url_for('user.register') }}" method="post">

            <div class="mb-3">
                <input type="text"
                       name="username"
                       class="form-control"
                       placeholder="Username"
                       required>
            </div>

            <div class="mb-3">
                <input type="password"
                       name="password"
                       class="form-control"
                       placeholder="Password"
                       required>
            </div>

            <div class="d-flex justify-content-between align-items-center mt-4">


                <a href="{{ url_for('user.login') }}" class="btn linkUser ">
                    Log in
                </a>

                <button type="submit" class="btn btn-primary">
                    Sign me up
                </button>


            </div>

        </form>

        <div class="mt-3  relative  flashContainer  ">
         {% include "flash_message.html" %}
        </div>

    </div>

</div>

{% endblock %}
