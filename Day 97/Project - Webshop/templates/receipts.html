{% extends "base.html" %}
{% block title %}Receipts{% endblock %}
{% block content %}

<h1 class="mb-4 pt-5">
    Receipts
</h1>

{% if receipts %}
    {% for receipt in receipts %}
        <div class="card mb-3">
            <div class="card-body d-flex justify-content-between align-items-center">

                <div>
                    <h5 class="mb-1">
                        Order #{{ receipt.order_number }}
                    </h5>

                    <small class="text-muted">
                        Total: ${{ receipt.total_price }}
                    </small>
                </div>

                <a href="{{ url_for('receipt.receipt', receipt_id=receipt.id) }}"
                   class="btn icon border">
                    View receipt
                </a>

            </div>
        </div>
    {% endfor %}

{% else %}
    <div class="alert">
        No receipts found
    </div>
{% endif %}

{% endblock %}
