 <!-- Head-->
  {% include "head.html" %}

  <!-- Navbar-->
  {% include "navbar.html" %}

  <main class="flex-grow-1 d-flex align-items-center">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-6">

          <!-- Title -->
          <header class="mb-4 text-center">
            <h1 class="fw-bolder">{{ post.title }}</h1>
          </header>

          <!-- Image -->
          <figure class="mb-4">
            <img class="img-fluid rounded" src="{{ post.image }}" alt="Blog image">
          </figure>

          <!-- Content -->
          <section class="fs-5">
            <p>{{ post.body }}</p>
          </section>

            <section>

             <button class=" btn btn-secondary btn-sm rounded-pill">
                <a href="{{ url_for('blog_post', post_id=post.id )}}/edit" class="text-dark" style="text-decoration: none;">
                    Redigera
                </a> </button>


                <button class=" btn btn-secondary btn-sm rounded-pill">
                <a href="{{url_for('blog_post', post_id=post.id )}}/delete" class="text-dark" style="text-decoration: none;" >
                    Radera
                </a> </button>


            </section>

        </div>
      </div>
    </div>
  </main>

</body>
</html>
