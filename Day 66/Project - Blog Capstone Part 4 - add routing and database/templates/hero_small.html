<!DOCTYPE HTML>
<html>
<head>
  <title>Blog</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" <script
    src="{{ url_for('static', filename='/js/scripts.js') }}">
  </script>
</head>

<body>

  <div class="position-relative overflow-hidden  ">
    <div class="d-flex  " lc-helper="video-bg">
      <div style="z-index:2; background-color: rgba(0, 0, 0, 0.5);" class="position-absolute w-100 h-100  ">
      </div>

      <video style="z-index:1;object-fit: cover; object-position: 50% 50%;" class="position-absolute w-100 h-100 "
        autoplay="" preload="" muted="" loop="" playsinline="">
        <source src={{input_video}} type="video/mp4">
      </video>
      

      <div style="z-index:3 "
        class=" container  pb-2 pt-2 mt-0  align-self-center text-center text-light col-md-8 offset-md-2">
        <section class="py-0">
          <div class="lc-block">
            <div editable="rich">
              <h1 class="fw-bolder display-6 display-md-4 display-lg-2 py-5 ">
                {{input_text}}
              </h1>
            </div>
          </div>
        </section>
      </div>


    </div>
  </div>
  </div>
  </div>


</body>
</html>
